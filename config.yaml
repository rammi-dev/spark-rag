# Infrastructure endpoints (from playground K8s cluster)
ollama:
  url: "http://localhost:11434"           # port-forwarded, or ollama.ollama.svc:11434 in-cluster
  embedding_model: "nomic-embed-text"

milvus:
  url: "http://localhost:19530"           # port-forwarded, or milvus.milvus.svc:19530 in-cluster

# LLM synthesis (off by default)
synthesis:
  enabled: false                          # set true + ANTHROPIC_API_KEY to enable
  provider: "claude"
  model: "claude-sonnet-4-20250514"

# Lance artifact store on Ceph S3
lance:
  s3_endpoint: "http://localhost:8080"    # port-forwarded, or rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:8080
  s3_bucket: "spark-rag"
  s3_prefix: "lance"                      # datasets at s3://spark-rag/lance/<dataset>/
  s3_access_key_env: "CEPH_ACCESS_KEY"    # env var names (not values)
  s3_secret_key_env: "CEPH_SECRET_KEY"

# Embedding experiments — column-per-model in Lance
embedding_experiments:
  models:
    - name: "nomic-embed-text"
      column: "emb_nomic"
      dimensions: 768
  active: "emb_nomic"                     # default column loaded into Milvus

# Spark versions to index
# Code + docs are ingested per version; all chunks tagged with spark_version metadata
# Queries can filter by version or search across all
spark_versions:
  baseline: "4.1.0"                       # default version for queries
  available:
    - tag: "v4.1.0"
      version: "4.1.0"
    - tag: "v3.5.4"
      version: "3.5.4"

# Ingestion sources — 4 data sources, 4 Milvus collections
ingestion:
  # 1. Spark source code (per version)
  #    Collection: spark_code
  spark_code:
    repo_url: "https://github.com/apache/spark.git"
    paths: ["sql/", "core/", "mllib/", "python/pyspark/"]

  # 2. Spark documentation (per version)
  #    Collection: spark_docs
  #    Source: docs/*.md from the same git repo (Markdown, not website scrape)
  #    Config tables are inline HTML in .md files, code examples via Jekyll include_example
  spark_docs:
    paths: ["docs/"]                             # relative to repo root
    examples_path: "examples/src/main/"          # resolves {% include_example %} tags
    glob: "*.md"                                 # only Markdown files

  # 3. StackOverflow — general Spark questions, answered only
  #    Collection: spark_stackoverflow
  #    Cross-version (spark_version extracted from content when detectable)
  stackoverflow:
    tags: ["apache-spark"]
    filter: "answered"                    # only posts with accepted or scored answers
    max_questions: 5000

  # 4. GitHub Issues — apache/spark, all states (open + closed)
  #    Collection: spark_issues
  #    Cross-version (milestone/labels may indicate version)
  github_issues:
    repo: "apache/spark"
    state: "all"                          # open + closed
    include_comments: true                # ingest issue comments too
    max_issues: 10000
